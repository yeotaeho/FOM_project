name: dance_app
description: "AI-based Street Dance Level Judgment & Career Guide Platform MVP"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  image_picker: ^1.1.2
  camera: ^0.11.2
  video_player: ^2.9.5
  fl_chart: ^0.71.0
  lottie: ^3.3.1
  shared_preferences: ^2.5.3
  percent_indicator: ^4.2.3
  http: ^1.2.2
  cross_file: ^0.3.4+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - video_data/card1/
    - video_data/card2/
    - video_data/card3/
    - video_data/card4/
    - video_data/card5/
